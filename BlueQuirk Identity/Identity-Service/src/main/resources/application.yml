springdoc:
  packagesToScan: com.ev.pcs.keycloakauth
server:
  port: 8087

spring:
  docker:
    compose:
      enabled: false
  application:
    name: identity-service
  #consul config
  cloud:
    consul:
      host: localhost  # Consul host
      port: 8500       # Consul port
      fail-fast: false

  output:
    ansi:
      enabled: always
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak-server:8080/realms/blue-quirk-realm
          jwk-set-uri: ${JWT_JWK_SET_URI:http://keycloak-server:8080/realms/blue-quirk-realm/protocol/openid-connect/certs}
      client:
        provider:
          keycloak:
            issuer-uri: http://keycloak-server:8080/auth/realms/blue-quirk-realm

# Secrets come from the environment (docker/.env, which is gitignored) — never
# commit them here. KEYCLOAK_CLIENT_SECRET / KEYCLOAK_ADMIN_PASSWORD must be set
# for the service to talk to Keycloak.
keycloak:
  auth-server-url: http://keycloak-server:8080
  realm: blue-quirk-realm
  resource: blue-quirk-client
  credentials:
    secret: ${KEYCLOAK_CLIENT_SECRET:}
  client-id: blue-quirk-client
  grant-type: password
  # IDENTITY_-prefixed on purpose: plain KEYCLOAK_ADMIN_PASSWORD already exists
  # in docker/.env as the Keycloak container's bootstrap password (a different
  # credential) and is injected into this container via env_file.
  name: ${IDENTITY_KEYCLOAK_ADMIN_USER:admin}
  password: ${IDENTITY_KEYCLOAK_ADMIN_PASSWORD:}


management:
  endpoints:
    web:
      exposure:
        # Only health/info — "*" exposed /actuator/env & heapdump, which leak
        # runtime secrets (Keycloak client secret, passwords) to anyone.
        include: "health,info"
#  tracing:
#    sampling:
#      probability: 1.0
#  zipkin:
#    tracing:
#      endpoint: http://zipkin:9411/api/v2/spans

#tracing
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        enabled: true

tracing:
  url: http://localhost:4317
