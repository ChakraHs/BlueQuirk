spring.application.name=blue-quirk-backend

# Server
server.port=9090

# Database connection
spring.datasource.url=jdbc:mariadb://localhost:3306/blue-quirk-db
spring.datasource.username=blue-quirk-user
spring.datasource.password=blue-quirk-pass-!

# Hibernate JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.open-in-view=false


spring.web.resources.static-locations=file:uploads/

# Validate via the realm's JWKS (signature + expiry). We deliberately do NOT set
# issuer-uri: tokens are minted through the Dockerized Keycloak, so their `iss`
# is the internal host (http://keycloak-server:8080/realms/blue-quirk-realm) while
# this backend runs on the host and reaches the same realm at localhost:8001. The
# signing keys are shared, so JWKS validation works across both hostnames.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8001/realms/blue-quirk-realm/protocol/openid-connect/certs

# Cloudflare R2 storage for product image uploads (via the REST API, not S3).
# account-id / bucket / public-base are not secrets. The API token IS a secret:
# supply it via the R2_API_TOKEN env var (Account -> Workers R2 Storage -> Edit).
# Leave R2_API_TOKEN unset to fall back to local-disk uploads.
r2.account-id=ce4c0a53b2a22e6106a593962344ab49
r2.bucket=bluequirk-media
r2.public-base=https://pub-bcddf7eebb064b6fb57f065569be6f5f.r2.dev
r2.key-prefix=products
r2.api-token=${R2_API_TOKEN:}

# Cash-on-delivery order settings.
# admin-email receives a notification after every order. shipping-fee is a flat
# amount added to the total (0 = free). currency is the label shown in emails.
order.admin-email=houcine.chakra10@gmail.com
order.shipping-fee=0
order.currency=DH

logging.level.org.springframework.security=DEBUG

