spring.application.name=blue-quirk-backend

# Server
server.port=9090

# Multipart upload limits. Product images are now sent full-resolution (the admin
# UI no longer pre-compresses) so the backend can store a genuine original and
# generate the optimized thumbnail/display variants itself. The 1MB Spring
# default is far too small for full-res photos, so raise it here.
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB

# Database connection
spring.datasource.url=jdbc:mariadb://localhost:3306/blue-quirk-db
spring.datasource.username=blue-quirk-user
spring.datasource.password=blue-quirk-pass-!

# Hibernate JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.open-in-view=false


spring.web.resources.static-locations=file:uploads/

# --- Native Identity Domain (Spring Security auth, MariaDB-only) ---
# JWT signing secret. MUST be overridden via JWT_SECRET in every real environment
# (any length; it is stretched to a 512-bit HMAC key). Native tokens are issued with
# iss=bluequirk and validated locally; legacy Keycloak tokens still validate via the
# jwk-set-uri below until Keycloak is decommissioned (dual-issuer coexistence).
bluequirk.security.jwt.secret=${JWT_SECRET:dev-only-change-me-please-override-in-production-0123456789}
bluequirk.security.jwt.issuer=bluequirk
bluequirk.security.jwt.access-token-ttl=15m
bluequirk.security.refresh.ttl=7d
bluequirk.security.refresh.remember-me-ttl=30d
bluequirk.security.lockout.max-attempts=5
bluequirk.security.lockout.duration=15m
bluequirk.security.tokens.verification-ttl=24h
bluequirk.security.tokens.reset-ttl=30m
bluequirk.security.rate-limit.login-max-per-minute=10
bluequirk.security.rate-limit.register-max-per-minute=5
bluequirk.security.rate-limit.forgot-password-max-per-minute=3
# One-time admin bootstrap (safe to leave blank once an admin exists). Set both to
# guarantee an admin login independent of the Keycloak migration.
bluequirk.security.bootstrap.admin-email=${AUTH_ADMIN_EMAIL:}
bluequirk.security.bootstrap.admin-password=${AUTH_ADMIN_PASSWORD:}
bluequirk.security.bootstrap.admin-name=${AUTH_ADMIN_NAME:RedQuirk Admin}

# Cloudflare R2 storage for product image uploads (via the REST API, not S3).
# account-id / bucket / public-base are not secrets. The API token IS a secret:
# supply it via the R2_API_TOKEN env var (Account -> Workers R2 Storage -> Edit).
# Falls back to CLOUDFLARE_API_TOKEN — the same name the seed/r2-sync tooling
# uses — so the existing R2 credential is reused without renaming. When neither
# is set, product image uploads are rejected (no local-disk fallback).
r2.account-id=ce4c0a53b2a22e6106a593962344ab49
r2.bucket=bluequirk-media
r2.public-base=https://pub-bcddf7eebb064b6fb57f065569be6f5f.r2.dev
r2.key-prefix=products
r2.api-token=${R2_API_TOKEN:${CLOUDFLARE_API_TOKEN:}}

# Email transport. `email.provider` selects the active EmailProvider bean:
#   resend -> ResendEmailProvider (HTTP API, recommended for transactional mail)
#   smtp   -> SmtpEmailProvider (DB-configured SMTP, e.g. Gmail) [default]
# Resend needs an API key (secret) via the RESEND_API_KEY env var. resend.from
# must use a domain verified in Resend (contact.redquirk.com is verified), so
# emails now deliver to any customer address — not just the account owner.
# Override the from-address with the RESEND_FROM env var when needed.
email.provider=resend
resend.api-key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:RedQuirk <orders@contact.redquirk.com>}

# Cash-on-delivery order settings.
# admin-email receives a notification after every order. shipping-fee is the flat
# delivery charge; it is waived (set to 0 on the order) once the order subtotal
# reaches free-shipping-threshold. currency is the label shown in emails.
order.admin-email=houcine.chakra10@gmail.com
order.shipping-fee=29
order.free-shipping-threshold=300
order.currency=DH

# Store branding/locale defaults. These only SEED the store_settings row the
# first time it is created; afterwards the admin dashboard (Settings page,
# /api/settings) is the source of truth and these are ignored.
store.name=RedQuirk
store.default-lang=fr

# Public storefront base URL, used to build links in emails (e.g. the order
# tracking link). This is deployment-level config, so it lives in properties and
# is overridden per environment via the APP_FRONTEND_BASE_URL env var rather than
# the DB. No trailing slash. Tracking page route: /order-tracking?order=<number>.
app.frontend-base-url=${APP_FRONTEND_BASE_URL:http://localhost:3000}

# Todify print-on-demand integration (REST API + inbound webhooks).
# base-url / currency are non-secret. api-token and webhook-secret ARE secrets:
# supply them via the TODIFY_API_TOKEN / TODIFY_WEBHOOK_SECRET env vars (loaded
# from the git-ignored .env file). When the token is blank, Todify sync no-ops
# gracefully (orders are still saved locally — never lost). Set todify.enabled=false
# to disable the integration entirely.
todify.enabled=${TODIFY_ENABLED:true}
todify.base-url=${TODIFY_BASE_URL:https://todify.ma/api/v1}
todify.api-token=${TODIFY_API_TOKEN:}
todify.webhook-secret=${TODIFY_WEBHOOK_SECRET:}
todify.currency=${TODIFY_CURRENCY:MAD}
# Outbound order-sync retry: max attempts before an order stays FAILED for manual
# action; the scheduled retry job spaces attempts out.
todify.retry.max-attempts=${TODIFY_RETRY_MAX_ATTEMPTS:5}

logging.level.org.springframework.security=DEBUG

# --- Self-hosted analytics ---
# enabled: master switch for the ingest endpoint.
# geoip.db-path: path (relative to the backend working dir) to the offline MaxMind
#   GeoLite2-City .mmdb. When the file is absent, country/city are simply left null
#   and everything else keeps working — so this is safe to leave as-is until you
#   drop in the free DB file. The geoip/ folder is git-ignored.
# ip-hash-salt: secret salt for hashing IPs (we never store raw IPs). Override via
#   the ANALYTICS_IP_SALT env var in production.
# own-host: a fragment of your public host; referrers containing it count as DIRECT.
# retention.raw-days: raw events/page-views/sessions older than this are pruned
#   nightly (daily summaries are kept forever).
# session-timeout-minutes: inactivity gap that closes a session.
analytics.enabled=${ANALYTICS_ENABLED:true}
analytics.geoip.db-path=${ANALYTICS_GEOIP_DB:geoip/GeoLite2-City.mmdb}
analytics.ip-hash-salt=${ANALYTICS_IP_SALT:bluequirk-analytics-salt}
analytics.own-host=${ANALYTICS_OWN_HOST:bluequirk}
analytics.retention.raw-days=${ANALYTICS_RETENTION_RAW_DAYS:90}
analytics.session-timeout-minutes=${ANALYTICS_SESSION_TIMEOUT_MINUTES:30}
analytics.rate-limit.max-per-window=${ANALYTICS_RATE_MAX:120}
analytics.rate-limit.window-seconds=${ANALYTICS_RATE_WINDOW:60}

