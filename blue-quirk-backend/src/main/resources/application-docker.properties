spring.application.name=blue-quirk-backend

# Server
server.port=8080

# Database connection
spring.datasource.url=jdbc:mariadb://host.docker.internal:3306/blue-quirk-db
spring.datasource.username=blue-quirk-user
spring.datasource.password=blue-quirk-pass-!

# Hibernate JPA. SQL logging is OFF by default in the container profile; enable
# per-deployment with JPA_SHOW_SQL=true for debugging only.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Locally-stored uploads live on a mounted volume so images survive redeploys.
app.uploads.dir=${UPLOADS_DIR:/app/uploads}

# --- Actuator: health probes for Docker/Caddy/monitoring ---
# Only health + info are exposed; health splits into liveness/readiness groups
# (readiness also checks the DB). Details are hidden from anonymous callers.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.group.readiness.include=readinessState,db
management.endpoint.health.group.liveness.include=livenessState

# Native identity JWT secret (see application.properties). Override via JWT_SECRET.
bluequirk.security.jwt.secret=${JWT_SECRET:dev-only-change-me-please-override-in-production-0123456789}

# Public storefront base URL for links in emails (order tracking). Set the real
# public domain per deployment via the APP_FRONTEND_BASE_URL env var, e.g.
# APP_FRONTEND_BASE_URL=https://bluequirk.shop
app.frontend-base-url=${APP_FRONTEND_BASE_URL:http://localhost:3000}

# Todify integration. Secrets via env vars (TODIFY_API_TOKEN / TODIFY_WEBHOOK_SECRET).
todify.enabled=${TODIFY_ENABLED:true}
todify.base-url=${TODIFY_BASE_URL:https://todify.ma/api/v1}
todify.api-token=${TODIFY_API_TOKEN:}
todify.webhook-secret=${TODIFY_WEBHOOK_SECRET:}
todify.currency=${TODIFY_CURRENCY:MAD}
todify.retry.max-attempts=${TODIFY_RETRY_MAX_ATTEMPTS:5}

# --- Production logging (env-overridable; quiet defaults) ---
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}
logging.level.shop.bluequirk=${LOG_LEVEL_APP:INFO}

