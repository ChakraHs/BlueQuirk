spring.application.name=blue-quirk-backend

# Server
server.port=8080

# Database connection
spring.datasource.url=jdbc:mariadb://host.docker.internal:3306/blue-quirk-db
spring.datasource.username=blue-quirk-user
spring.datasource.password=blue-quirk-pass-!

# Hibernate JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect


#spring.web.resources.static-locations=file:/app/uploads/

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak-server:8080/realms/blue-quirk-realm

logging.level.org.springframework.security=DEBUG

