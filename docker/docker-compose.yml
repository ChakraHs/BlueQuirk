# BlueQuirk — simplified production stack (post-Keycloak).
#
# Four services only: frontend, backend, MariaDB, Caddy (reverse proxy + auto-TLS).
# No Keycloak, no PostgreSQL, no Identity Service — authentication is native to the
# backend (see docs/authentication.md). Redis is provided commented-out; enable it
# only when the backend scales beyond a single replica (shared rate-limit/lockout).
#
# Usage:  cp .env.example .env  &&  edit .env  &&  docker compose up -d --build

services:
  mariadb:
    image: mariadb:11
    container_name: bluequirk-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [bluequirk]

  backend:
    build:
      context: ../blue-quirk-backend
      dockerfile: Dockerfile
    container_name: bluequirk-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # --- Native identity ---
      JWT_SECRET: ${JWT_SECRET}
      AUTH_ADMIN_EMAIL: ${AUTH_ADMIN_EMAIL}
      AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD}
      APP_FRONTEND_BASE_URL: ${PUBLIC_SITE_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      # Native-only JWT validation: no Keycloak JWKS. Leaving this empty makes the
      # DelegatingIssuerJwtDecoder skip the legacy Keycloak path entirely.
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ""
    depends_on:
      mariadb:
        condition: service_healthy
    networks: [bluequirk]

  frontend:
    build:
      context: ../blue-quirk-frontend
      dockerfile: Dockerfile
    container_name: bluequirk-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
    depends_on: [backend]
    networks: [bluequirk]

  caddy:
    image: caddy:2
    container_name: bluequirk-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [frontend, backend]
    networks: [bluequirk]

  # Enable when running more than one backend replica so rate-limiting and account
  # lockout state is shared. The RateLimiter is written to swap to a Redis backend
  # without changing callers.
  # redis:
  #   image: redis:7-alpine
  #   container_name: bluequirk-redis
  #   restart: unless-stopped
  #   networks: [bluequirk]

volumes:
  mariadb-data:
  caddy-data:
  caddy-config:

networks:
  bluequirk:
    driver: bridge
